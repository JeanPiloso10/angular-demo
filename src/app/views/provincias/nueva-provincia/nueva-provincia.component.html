<div class="modal-header">
    <h4 class="modal-title">Nueva Provincia</h4>
    <button type="button" (click)="cerrar()" cButtonClose>
    </button>
</div>
<div class="modal-body">
    <app-formulario-provincia [isModal]="true" [errores]="errores" [StateEnum]="StateEnum"
        [modelo]="codigoPais ? { codigoPais: codigoPais } : null"
        (onSubmit)="guardarCambios($event)"></app-formulario-provincia>
</div>
