<c-row>
  <c-col>
    <form [formGroup]="form" (submit)="guardar()">
      <c-card>
        <div class="modal-header">
          <h5 class="modal-title">Crear Nuevo Rol</h5>
          <button type="button" (click)="cerrar()" cButtonClose></button>
        </div>
        <c-card-body>
          <c-col>
            <label cLabel>Nombre del Rol</label>
            <input cFormControl sizing="sm" id="Name" autocomplete="off"
                   formControlName="Name" type="text"
                   [ngClass]="{ 'is-invalid': form.get('Name')!.invalid && form.get('Name')!.touched }"
                   #rolNameInput />
            <c-form-feedback [valid]="form.get('Name')!.valid && form.get('Name')!.touched">
              {{ obtenerError('Name') }}
            </c-form-feedback>
          </c-col>
        </c-card-body>
        <c-card-footer>
          <c-button-group role="group">
            <button cButton color="primary" type="submit" [disabled]="form.invalid || loading">
              <c-spinner [hidden]="!loading" component="span" size="sm"></c-spinner>
              Crear Rol
            </button>
            <a cButton color="secondary" variant="outline" [disabled]="loading" (click)="cerrar()">
              Cancelar
            </a>
          </c-button-group>
        </c-card-footer>
      </c-card>
    </form>
  </c-col>
</c-row>
