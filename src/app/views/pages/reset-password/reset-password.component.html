<div class="bg-light dark:bg-transparent min-vh-100 d-flex flex-row align-items-center">
    <c-container breakpoint="md">
      <c-row class="justify-content-center">
        <c-col md="8" lg="6" xl="4">
          <c-card-group>
            <c-card class="p-4">
              <c-card-body>
                <form cForm (submit)="onSubmit()" [formGroup]='form'>
                  <h1>Restablecer contraseña</h1>
                  <p class="text-medium-emphasis">Ingrese su nueva contraseña</p>
                  <c-input-group class="mb-3">
                    <span cInputGroupText>
                      <svg cIcon name="cilLockLocked"></svg>
                    </span>
                    <input #password formControlName="password"
                           cFormControl
                           placeholder="Nueva contraseña" 
                           [type]="showPassword ? 'text' : 'password'" />
                    <span cInputGroupText role="button" tabindex="0"
                          (click)="togglePasswordVisibility('password')"
                          (keydown.enter)="togglePasswordVisibility('password')"
                          (keydown.space)="togglePasswordVisibility('password')"
                          [attr.aria-pressed]="showPassword"
                          [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
                          [attr.title]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
                          style="cursor:pointer; user-select:none;">
                      <svg cIcon [name]="showPassword ? 'cilLowVision' : 'cilEye'"></svg>
                    </span>
                  </c-input-group>
                  <c-input-group class="mb-3">
                    <span cInputGroupText>
                      <svg cIcon name="cilLockLocked"></svg>
                    </span>
                    <input formControlName="confirmPassword"
                           cFormControl
                           placeholder="Confirmar nueva contraseña" 
                           [type]="showConfirmPassword ? 'text' : 'password'" />
                    <span cInputGroupText role="button" tabindex="0"
                          (click)="togglePasswordVisibility('confirm')"
                          (keydown.enter)="togglePasswordVisibility('confirm')"
                          (keydown.space)="togglePasswordVisibility('confirm')"
                          [attr.aria-pressed]="showConfirmPassword"
                          [attr.aria-label]="showConfirmPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
                          [attr.title]="showConfirmPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
                          style="cursor:pointer; user-select:none;">
                      <svg cIcon [name]="showConfirmPassword ? 'cilLowVision' : 'cilEye'"></svg>
                    </span>
                  </c-input-group>
                  <c-row>
                    <c-col xs="6">
                      <button type="submit" cButton class="px-4" color="primary" [disabled]="loading">
                        <c-spinner [hidden]="!loading" component="span" size="sm"></c-spinner>
                        Restablecer
                      </button>
                    </c-col>
                  </c-row>
                </form>
              </c-card-body>
              <app-mostrar-errores [errores]="errores"></app-mostrar-errores>
            </c-card>
          </c-card-group>
        </c-col>
      </c-row>
    </c-container>
  </div>
