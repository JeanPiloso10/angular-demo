<div *ngIf="!showError" class="authentication-wrapper">
  <div class="loading-message">
      <p>Autenticando con Microsoft, por favor espera...</p>
      <div class="spinner"></div>
  </div>
</div>

<div *ngIf="showError" class="bg-light dark:bg-transparent min-vh-100 d-flex flex-row align-items-center">
  <c-container>
      <c-row class="justify-content-center">
          <c-col md="6">
              <div class="clearfix">
                  <h1 class="float-start display-3 me-4">Autenticación fallida.</h1>
                  <!-- <h4 class="pt-3">Autenticación fallida.</h4> -->
                  <p class="text-body-secondary float-start">
                      {{ errorMessage || 'Ocurrió un problema durante la autenticación.' }}
                  </p>
              </div>
              <c-input-group class="input-prepend">
                  <button (click)="navigate()" cButton color="info">Volver al inicio</button>
              </c-input-group>   
          </c-col>
      </c-row>
  </c-container>
</div>
