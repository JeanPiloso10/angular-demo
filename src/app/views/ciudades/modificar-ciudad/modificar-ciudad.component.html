<div class="modal-header">
    <h4 class="modal-title">Modificar Ciudad</h4>
    <button type="button" (click)="cerrar()" cButtonClose>
    </button>
</div>
<div class="modal-body">
    <app-formulario-ciudad *ngIf="modelo" [isModal]="true" [modelo]="modelo" [StateEnum]="StateEnum"
        (onSubmit)="guardarCambios($event)"></app-formulario-ciudad>
</div>
