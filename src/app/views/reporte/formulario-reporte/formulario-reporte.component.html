<div class="animate__animated animate__fadeIn">
    <form cForm
    [formGroup]="form">

    <div class="right-z-index-top-toolbar" [ngStyle]="{'top': '0px'}">
        <ejs-toolbar height="25px"  width='100%'>
            <e-items>
                <e-item text='Grabar' tooltipText='Grabar - Alt+G' prefixIcon='e-icons e-save' overflow='Show' showTextOn='overflow' (click)="guardarCambios()" [disabled]="form.invalid" ></e-item>
                <!-- <e-item text='Cancelar' tooltipText='Cancelar - Alt+C' prefixIcon='e-icons e-undo' overflow='Show' showTextOn='overflow' (click)="cancelar()"  ></e-item> -->
            </e-items>
        </ejs-toolbar>
    </div>

    <br/>
    <c-row>
        <c-col>
            <c-card>
                <c-card-body> 
                    <c-col>
                        <label cLabel >Transacción</label>
                        <ejs-combobox
                        #codigoTransaccion
                        id='codigoTransaccion' 
                        allowFiltering="true"
                        (filtering)='onFilteringTransaccion($event)'
                        [allowCustom]="false"
                        [showClearButton]="true" 
                        formControlName="codigoTransaccion" 
                        
                        [dataSource]='transacciones' 
                        [fields]='fieldsTransaccion' 
                        [placeholder]='localWaterMark'
                        [ngClass]="{ 'is-invalid':  form.get('codigoTransaccion').invalid &&  form.get('codigoTransaccion').touched}"
                        ></ejs-combobox> 
                        <c-form-feedback
                        [ngClass]="{ 'is-invalid':  form.get('codigoTransaccion').invalid &&  form.get('codigoTransaccion').touched}">
                        {{ obtenerError('codigoTransaccion') }}
                    </c-form-feedback>
                    </c-col>
                    
                    <c-col>
                        <label cLabel >Sucursal</label>
                        <ejs-combobox id='idSucursal' 
                                    allowFiltering="true"
                                    (filtering)='onFilteringSucursal($event)'
                                    [allowCustom]="false"
                                    [showClearButton]="true" 
                                    formControlName="idSucursal" 
                                    [dataSource]='sucursales' 
                                    [fields]='fieldsSucursal' 
                                    [placeholder]='localWaterMark'
                                    [ngClass]="{ 'is-invalid':  form.get('idSucursal').invalid &&  form.get('idSucursal').touched}"
                        ></ejs-combobox> 
                        <c-form-feedback
                        [ngClass]="{ 'is-invalid':  form.get('idSucursal').invalid &&  form.get('idSucursal').touched}">
                        {{ obtenerError('idSucursal') }}
                    </c-form-feedback>
                    </c-col>

                
                    <c-col >
                        <label cLabel >Refencia 1</label>
                        <input 
                        cFormControl sizing="sm" 
                        [valid]="form.get('referencia1').valid" 
                        oninput="this.value = this.value.toUpperCase()" 
                        autocomplete="off" 
                        formControlName="referencia1" 
                        type="text" #referencia1 />  
                        <c-form-feedback [valid]="form.get('referencia1').valid">{{obtenerError('referencia1')}}</c-form-feedback>
                    </c-col>
                   
                    <c-col >
                        <label cLabel >Refencia 2</label>
                        <input 
                        cFormControl sizing="sm" 
                        [valid]="form.get('referencia2').valid" 
                        oninput="this.value = this.value.toUpperCase()" 
                        autocomplete="off" 
                        formControlName="referencia2" 
                        type="text" #referencia2 />  
                        <c-form-feedback [valid]="form.get('referencia2').valid">{{obtenerError('referencia2')}}</c-form-feedback>
                    </c-col>

                    <c-col >
                        <label cLabel >Refencia 3</label>
                        <input 
                        cFormControl sizing="sm" 
                        [valid]="form.get('referencia3').valid" 
                        oninput="this.value = this.value.toUpperCase()" 
                        autocomplete="off" 
                        formControlName="referencia3" 
                        type="text" #referencia3 />  
                        <c-form-feedback [valid]="form.get('referencia3').valid">{{obtenerError('referencia3')}}</c-form-feedback>
                    </c-col>

                    <c-col >
                        <label cLabel >xmlName</label>
                        <input 
                        cFormControl sizing="sm" 
                        [valid]="form.get('xmlName').valid" 
                        autocomplete="off" 
                        formControlName="xmlName" 
                        type="text" #xmlName />  
                        <c-form-feedback [valid]="form.get('xmlName').valid">{{obtenerError('xmlName')}}</c-form-feedback>
                    </c-col>

                    <c-col >
                        <label cLabel >xmlPathSchema</label>
                        <input 
                        cFormControl sizing="sm" 
                        [valid]="form.get('xmlPathSchema').valid" 
                        autocomplete="off" 
                        formControlName="xmlPathSchema" 
                        type="text" #xmlPathSchema />  
                        <c-form-feedback [valid]="form.get('xmlPathSchema').valid">{{obtenerError('xmlPathSchema')}}</c-form-feedback>
                    </c-col>

                    <c-col >
                        <label cLabel >FileName</label>
                        <input 
                        cFormControl sizing="sm" 
                        autocomplete="off" 
                        formControlName="originalFileName" 
                        type="text" #originalFileName />  
                    </c-col>

                    <br/>
                    
                    <c-col >
                        <input type="file" #fileInput class="form-control-file" accept=".mrt" (change)="onFileChange($event)" />
                    </c-col>
                   

                    
                    
                </c-card-body>
            </c-card>
        </c-col>
    </c-row>
  
    
</form>
</div>
