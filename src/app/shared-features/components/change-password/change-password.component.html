
        <form 
        autoComplete="off"
        (submit)="guardarCambios()"
        [formGroup]="form">

        <c-card>
            <div class="modal-header">
                <h4 class="modal-title">Ingrese la nueva contraseña</h4>
                <button type="button" (click)="cerrar()" cButtonClose>
                </button>
              </div>
            <c-card-body>                                                    
                             
                    <c-col>
                        <input type="text" name="username" autocomplete="username"  style="display: none;">
                    </c-col>
                                        <c-col>
                                                <label cLabel>Contraseña actual</label>
                                                <c-input-group>
                                                    <input (keydown)="onKeydown($event, 'Password')" cFormControl
                                                                 [ngClass]="{ 'is-invalid': form.get('Password').invalid && form.get('Password').touched}"
                                                                 id="Password" autocomplete="off" formControlName="Password" 
                                                                 [type]="showPassword ? 'text' : 'password'" #inputPassword />
                                                    <span cInputGroupText role="button" tabindex="0"
                                                                (click)="togglePasswordVisibility('current')"
                                                                (keydown.enter)="togglePasswordVisibility('current')"
                                                                (keydown.space)="togglePasswordVisibility('current')"
                                                                [attr.aria-pressed]="showPassword"
                                                                [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
                                                                [attr.title]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
                                                                style="cursor:pointer; user-select:none;">
                                                        <svg cIcon [name]="showPassword ? 'cilLowVision' : 'cilEye'"></svg>
                                                    </span>
                                                </c-input-group>
                                                <c-form-feedback 
                                                    [ngClass]="{ 'is-invalid': form.get('Password').invalid && form.get('Password').touched}"
                                                >{{obtenerError('Password')}}</c-form-feedback>
                                        </c-col>

                                        <c-col>
                                                <label cLabel>Nueva contraseña</label>
                                                <c-input-group>
                                                    <input cFormControl (keydown)="onKeydown($event, 'NewPassword')"  
                                                                 [ngClass]="{ 'is-invalid': form.get('NewPassword').invalid && form.get('NewPassword').touched}"
                                                                 id="NewPassword" autocomplete="off" formControlName="NewPassword" 
                                                                 [type]="showNewPassword ? 'text' : 'password'" #inputNewPassword/>
                                                    <span cInputGroupText role="button" tabindex="0"
                                                                (click)="togglePasswordVisibility('new')"
                                                                (keydown.enter)="togglePasswordVisibility('new')"
                                                                (keydown.space)="togglePasswordVisibility('new')"
                                                                [attr.aria-pressed]="showNewPassword"
                                                                [attr.aria-label]="showNewPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
                                                                [attr.title]="showNewPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
                                                                style="cursor:pointer; user-select:none;">
                                                        <svg cIcon [name]="showNewPassword ? 'cilLowVision' : 'cilEye'"></svg>
                                                    </span>
                                                </c-input-group>
                                                <c-form-feedback 
                                                    [ngClass]="{ 'is-invalid': form.get('NewPassword').invalid && form.get('NewPassword').touched}"
                                                >{{obtenerError('NewPassword')}}</c-form-feedback>
                                        </c-col>

                                        <c-col>
                                                <label cLabel>Repita la nueva Contraseña</label>
                                                <c-input-group>
                                                    <input cFormControl (keydown)="onKeydown($event, 'NewPasswordRepeat')" 
                                                                 [ngClass]="{ 'is-invalid': form.get('NewPasswordRepeat').invalid && form.get('NewPasswordRepeat').touched}" 
                                                                 id="NewPasswordRepeat" autocomplete="new-password" formControlName="NewPasswordRepeat" 
                                                                 [type]="showNewPasswordRepeat ? 'text' : 'password'" #inputNewPasswordRepeat/>
                                                    <span cInputGroupText role="button" tabindex="0"
                                                                (click)="togglePasswordVisibility('repeat')"
                                                                (keydown.enter)="togglePasswordVisibility('repeat')"
                                                                (keydown.space)="togglePasswordVisibility('repeat')"
                                                                [attr.aria-pressed]="showNewPasswordRepeat"
                                                                [attr.aria-label]="showNewPasswordRepeat ? 'Ocultar contraseña' : 'Mostrar contraseña'"
                                                                [attr.title]="showNewPasswordRepeat ? 'Ocultar contraseña' : 'Mostrar contraseña'"
                                                                style="cursor:pointer; user-select:none;">
                                                        <svg cIcon [name]="showNewPasswordRepeat ? 'cilLowVision' : 'cilEye'"></svg>
                                                    </span>
                                                </c-input-group>
                                                <c-form-feedback 
                                                    [ngClass]="{ 'is-invalid': form.get('NewPasswordRepeat').invalid && form.get('NewPasswordRepeat').touched}"
                                                >{{obtenerError('NewPasswordRepeat')}}</c-form-feedback>                 
                                        </c-col>

            </c-card-body>
            <c-card-footer>
                <c-button-group aria-label="Basic mixed styles example" role="group">
                    <button cButton color="primary" type="submit" [disabled]="form.invalid || loading" >
                        <c-spinner [hidden]="!loading" component="span"  size="sm"></c-spinner>
                        Guardar
                    </button>    
                    <a cButton color="secondary" variant="outline" [disabled]="loading" (click)="cerrar()">
                        Cerrar
                    </a>  
                  </c-button-group>
            </c-card-footer>
        </c-card>
    </form>
