<!-- Highlight.js JS Library - carga diferida para no bloquear -->
<script>
  // Cargar Highlight.js de forma diferida después de que la página esté lista
  function cargarHighlightJs() {
    setTimeout(function() {
      var script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/gh/highlightjs/cdn-release/build/highlight.min.js';
      script.async = true;
      script.onload = function() {
        // Solo aplicar highlight a elementos existentes con código
        if (typeof hljs !== 'undefined') {
          document.querySelectorAll('pre code').forEach(function(block) {
            hljs.highlightElement(block);
          });
        }
      };
      document.head.appendChild(script);
    }, 2000);
  }
  
  // Verificar si load ya ocurrió (SPA rápida) o esperar el evento
  if (document.readyState === 'complete') {
    cargarHighlightJs();
  } else {
    window.addEventListener('load', cargarHighlightJs);
  }
</script>
